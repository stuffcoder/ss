<!DOCTYPE html>
<html>
<head>
    <title>Static One-Way Screenshare</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        textarea { width: 100%; height: 100px; }
        video { width: 100%; max-width: 600px; border: 1px solid #ccc; background: #000; }
        .box { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Static One-Way Screenshare</h1>

    <div class="box">
        <h2>Step 1: The Sharer (User A)</h2>
        <button id="startShareBtn">1. Capture Screen & Create Offer</button>
        <p>Copy this Offer and send it to the Viewer:</p>
        <textarea id="offerText" readonly></textarea>
        
        <p>Paste the Answer from the Viewer here to start the stream:</p>
        <textarea id="answerInput" placeholder="Paste Answer JSON here..."></textarea>
        <button id="acceptAnswerBtn">2. Connect</button>
    </div>

    <div class="box">
        <h2>Step 2: The Viewer (User B)</h2>
        <p>Paste the Offer from the Sharer here:</p>
        <textarea id="offerInput" placeholder="Paste Offer JSON here..."></textarea>
        <button id="createAnswerBtn">Create Answer</button>
        
        <p>Copy this Answer and send it back to the Sharer:</p>
        <textarea id="answerText" readonly></textarea>
    </div>

    <div class="box">
        <h2>Live Stream</h2>
        <video id="remoteVideo" autoplay playsinline controls></video>
    </div>

    <script>
        const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
        let pc = new RTCPeerConnection(configuration);
        let localStream;

        // --- SHARER CODE ---
        document.getElementById('startShareBtn').addEventListener('click', async () => {
            localStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            
            // Add the screen tracks to the peer connection
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            // Handle ICE candidates (gathering network routing info)
            pc.onicecandidate = e => {
                if (!e.candidate) {
                    // Once gathering is done, output the full SDP offer
                    document.getElementById('offerText').value = JSON.stringify(pc.localDescription);
                }
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
        });

        document.getElementById('acceptAnswerBtn').addEventListener('click', async () => {
            const answer = JSON.parse(document.getElementById('answerInput').value);
            await pc.setRemoteDescription(new RTCSessionDescription(answer));
        });


        // --- VIEWER CODE ---
        document.getElementById('createAnswerBtn').addEventListener('click', async () => {
            const offer = JSON.parse(document.getElementById('offerInput').value);
            
            // Listen for the incoming stream
            pc.ontrack = event => {
                document.getElementById('remoteVideo').srcObject = event.streams[0];
            };

            pc.onicecandidate = e => {
                if (!e.candidate) {
                    document.getElementById('answerText').value = JSON.stringify(pc.localDescription);
                }
            };

            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
        });
    </script>
</body>
</html>
